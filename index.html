<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KimiDance - 登录</title>
  <meta name="description" content="KimiDance AI 自动拉片工具登录入口。">
  <style>
    :root {
      --bg: #16140f;
      --bg-deep: #0c0b08;
      --panel: rgba(255, 255, 255, 0.045);
      --panel-strong: rgba(255, 255, 255, 0.075);
      --border: rgba(243, 224, 206, 0.13);
      --border-strong: rgba(243, 224, 206, 0.28);
      --ink: #eeeeee;
      --ink-2: #c8c2bc;
      --ink-3: #8a847e;
      --ink-4: #5d5852;
      --cream: #f3e0ce;
      --cream-soft: rgba(243, 224, 206, 0.10);
      --terra: #c06553;
      --terra-soft: rgba(192, 101, 83, 0.20);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 10px;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-deep);
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      position: relative;
      background:
        radial-gradient(900px 560px at 16% 10%, rgba(243, 224, 206, 0.10), transparent 58%),
        radial-gradient(760px 520px at 88% 90%, rgba(192, 101, 83, 0.28), transparent 58%),
        radial-gradient(640px 460px at 20% 100%, rgba(243, 224, 206, 0.055), transparent 62%),
        linear-gradient(180deg, var(--bg) 0%, #1e1d1a 100%);
      isolation: isolate;
    }

    .login-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: overlay;
      opacity: 0.5;
      z-index: -1;
    }

    .login-stage {
      width: min(1160px, 100%);
      min-height: min(760px, calc(100vh - 68px));
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(12, 11, 8, 0.44);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.045);
      backdrop-filter: blur(18px) saturate(130%);
    }

    .brand-panel {
      position: relative;
      min-height: 660px;
      display: flex;
      flex-direction: column;
      padding: 52px 54px 44px;
      border-right: 1px solid rgba(255, 255, 255, 0.07);
    }

    .brand-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(720px 460px at 22% 16%, rgba(243, 224, 206, 0.08), transparent 62%),
        radial-gradient(620px 420px at 88% 92%, rgba(192, 101, 83, 0.18), transparent 58%);
    }

    .brand-panel > * {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 162px;
      height: auto;
      display: block;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 10px rgba(243, 224, 206, 0.22));
    }

    .brand-copy {
      margin-top: auto;
      padding-top: 84px;
    }

    .label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terra);
    }

    .headline {
      margin: 16px 0 0;
      max-width: 14ch;
      font-family: Georgia, "Songti SC", "STSongti-SC-Regular", serif;
      font-size: clamp(42px, 5vw, 62px);
      line-height: 1.02;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--ink);
    }

    .lead {
      margin: 26px 0 0;
      max-width: 34ch;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink-2);
    }

    .metrics {
      display: flex;
      align-items: stretch;
      gap: 26px;
      margin-top: 38px;
      color: var(--ink-3);
      font-size: 12px;
    }

    .metric {
      display: grid;
      gap: 6px;
    }

    .metric strong {
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 25px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0;
      color: var(--cream);
    }

    .metric small {
      font: inherit;
      color: var(--ink-3);
    }

    .metric-divider {
      width: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .copyright {
      position: absolute;
      left: 54px;
      bottom: 24px;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-4);
    }

    .form-panel {
      position: relative;
      display: flex;
      align-items: center;
      padding: 54px 62px;
      background: rgba(0, 0, 0, 0.19);
    }

    .form-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 44%);
    }

    .form-card {
      position: relative;
      width: 100%;
      max-width: 386px;
      margin: 0 auto;
    }

    .signup-link {
      position: absolute;
      top: -74px;
      right: 0;
      font-size: 12.5px;
      color: var(--ink-3);
    }

    .signup-link a {
      color: var(--cream);
      text-decoration: none;
      font-weight: 600;
    }

    .form-title {
      margin: 10px 0 0;
      font-family: Georgia, "Songti SC", "STSongti-SC-Regular", serif;
      font-size: 38px;
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--ink);
    }

    .form-subtitle {
      margin: 11px 0 30px;
      font-size: 13px;
      color: var(--ink-3);
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .field-row a {
      font-size: 11.5px;
      color: var(--ink-3);
      text-decoration: none;
    }

    .input {
      width: 100%;
      height: 47px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      background: rgba(0, 0, 0, 0.27);
      color: var(--ink);
      font-size: 14px;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .input::placeholder {
      color: var(--ink-4);
    }

    .input:focus {
      border-color: rgba(243, 224, 206, 0.48);
      background: rgba(0, 0, 0, 0.36);
      box-shadow: 0 0 0 4px rgba(243, 224, 206, 0.08);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin-top: 2px;
      cursor: pointer;
      color: var(--ink-2);
      font-size: 12px;
      user-select: none;
    }

    .remember input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      border: 1px solid rgba(243, 224, 206, 0.36);
      background: rgba(243, 224, 206, 0.12);
      color: var(--cream);
      font-size: 11px;
      line-height: 1;
    }

    .button {
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      color: var(--ink-2);
      background: var(--panel);
      font-size: 13.5px;
      font-weight: 600;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      background: var(--panel-strong);
    }

    .button-primary {
      width: 100%;
      margin-top: 6px;
      color: var(--bg);
      border-color: #f0ddc4;
      background: var(--cream);
      box-shadow: 0 8px 22px rgba(243, 224, 206, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .button-primary:hover {
      background: #f0ddc4;
      box-shadow: 0 12px 28px rgba(243, 224, 206, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .secondary-actions .button {
      min-height: 42px;
      font-size: 12.5px;
      font-weight: 500;
      background: transparent;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      color: var(--ink-4);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .oauth {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .oauth .button {
      min-height: 42px;
      border-color: rgba(255, 255, 255, 0.10);
      background: rgba(0, 0, 0, 0.21);
      font-size: 13px;
      font-weight: 500;
    }

    .oauth-mark {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      background: var(--cream-soft);
      color: var(--cream);
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .code-field {
      display: none;
    }

    .is-code-mode .password-field {
      display: none;
    }

    .is-code-mode .code-field {
      display: grid;
    }

    .toast {
      min-height: 18px;
      margin-top: 14px;
      color: var(--terra);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .login-shell {
        padding: 18px;
        place-items: start center;
      }

      .login-stage {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .brand-panel {
        min-height: auto;
        padding: 34px 28px 30px;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }

      .brand-copy {
        padding-top: 46px;
      }

      .headline {
        font-size: 42px;
      }

      .metrics {
        flex-wrap: wrap;
        gap: 18px;
      }

      .metric-divider {
        display: none;
      }

      .copyright {
        position: static;
        margin-top: 34px;
      }

      .form-panel {
        padding: 40px 28px 34px;
      }

      .form-card {
        max-width: none;
      }

      .signup-link {
        position: static;
        margin-bottom: 26px;
        text-align: right;
      }
    }

    @media (max-width: 520px) {
      .login-shell {
        padding: 0;
      }

      .login-stage {
        width: 100%;
        border: 0;
        border-radius: 0;
      }

      .brand-panel,
      .form-panel {
        padding-left: 22px;
        padding-right: 22px;
      }

      .logo {
        width: 136px;
      }

      .headline {
        font-size: 36px;
      }

      .lead {
        font-size: 14px;
      }

      .secondary-actions,
      .oauth {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-stage" aria-label="KimiDance 登录">
      <div class="brand-panel">
        <img class="logo" src="assets/logo-kimidance-cream.png" alt="KimiDance">

        <div class="brand-copy">
          <div class="label">Private Beta · 2026</div>
          <h1 class="headline">稍等片刻<br>一部漫剧视频<br>变成可用的文学剧本</h1>
          <p class="lead">上传视频，自动拉片、识别角色、分析叙事。<br>一个午觉的时间，拿到一份可读的剧本。</p>

          <div class="metrics" aria-label="产品指标">
            <div class="metric">
              <strong>1/10</strong>
              <small>竞品成本</small>
            </div>
            <div class="metric-divider" aria-hidden="true"></div>
            <div class="metric">
              <strong>2<small>GB</small></strong>
              <small>单文件上限</small>
            </div>
            <div class="metric-divider" aria-hidden="true"></div>
            <div class="metric">
              <strong>30<small>+</small></strong>
              <small>内测已完成</small>
            </div>
          </div>
        </div>

        <div class="copyright">© 2026 kimidance</div>
      </div>

      <div class="form-panel">
        <div class="form-card">
          <div class="signup-link">没有账号？ <a href="#apply">申请内测 →</a></div>

          <div class="label">登录</div>
          <h2 class="form-title">开始今天的拉片</h2>
          <p class="form-subtitle">邮箱 + 密码，或一次性验证码。</p>

          <form class="form" id="loginForm">
            <label class="field">
              <span class="label">邮箱</span>
              <input class="input" name="email" type="email" placeholder="you@studio.com" autocomplete="email" required>
            </label>

            <label class="field password-field">
              <span class="field-row">
                <span class="label">密码</span>
                <a href="#reset">忘记？</a>
              </span>
              <input class="input" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
            </label>

            <label class="field code-field">
              <span class="field-row">
                <span class="label">验证码</span>
                <a href="#send-code" id="sendCode">发送验证码</a>
              </span>
              <input class="input" name="code" inputmode="numeric" placeholder="6 位验证码" autocomplete="one-time-code">
            </label>

            <label class="remember">
              <input type="checkbox" checked>
              <span class="checkbox" aria-hidden="true">✓</span>
              <span>30 天内保持登录</span>
            </label>

            <button class="button button-primary" type="submit">登录 →</button>

            <div class="secondary-actions">
              <button class="button" type="button" id="modeToggle">改用验证码</button>
              <button class="button" type="button">微信扫码</button>
            </div>
          </form>

          <div class="divider">或继续以</div>

          <div class="oauth" aria-label="第三方登录">
            <button class="button" type="button"><span class="oauth-mark">G</span>Google</button>
            <button class="button" type="button"><span class="oauth-mark">✦</span>GitHub</button>
            <button class="button" type="button"><span class="oauth-mark">W</span>微信</button>
          </div>

          <div class="toast" id="toast" role="status" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const modeToggle = document.getElementById("modeToggle");
    const sendCode = document.getElementById("sendCode");
    const toast = document.getElementById("toast");

    modeToggle.addEventListener("click", () => {
      form.classList.toggle("is-code-mode");
      modeToggle.textContent = form.classList.contains("is-code-mode") ? "改用密码" : "改用验证码";
      toast.textContent = "";
    });

    sendCode.addEventListener("click", (event) => {
      event.preventDefault();
      toast.textContent = "验证码入口已就绪，接入后端后即可发送。";
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      toast.textContent = "登录界面已就绪，等待接入认证服务。";
    });
  </script>
</body>
</html>
