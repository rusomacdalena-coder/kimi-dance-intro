  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh-CN\"><head>\n<meta charset=\"utf-8\">\n<title>Kimidance UI · v1.0 (深夜剧场 · 定稿)<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=1400\">\n<style>/* === 全局 === */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; }\nbody {\n  font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"PingFang SC\", \"Helvetica Neue\", Arial, sans-serif;\n  color: #1c1917;\n  -webkit-font-smoothing: antialiased;\n}\n.mono { font-family: \"SF Mono\", ui-monospace, Menlo, Consolas, monospace; }\n.serif-zh { font-family: \"Songti SC\", \"STSongti-SC-Regular\", \"Source Han Serif SC\", \"Noto Serif SC\", \"Source Han Serif CN\", serif; }\n\n/* ================================================================== */\n/* 共享小组件                                                            */\n/* ================================================================== */\n.row { display: flex; }\n.col { display: flex; flex-direction: column; }\n.spread { display: flex; align-items: center; justify-content: space-between; }\n.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; }\n.gap-12 { gap: 12px; } .gap-14 { gap: 14px; } .gap-16 { gap: 16px; } .gap-20 { gap: 20px; }\n.gap-24 { gap: 24px; } .gap-32 { gap: 32px; }\n\n.scroll { overflow: hidden; }\n\n/* SVG placeholder thumb */\n.thumb {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(28,25,23,0.06) 0 8px,\n      rgba(28,25,23,0.02) 8px 16px);\n  display: flex; align-items: center; justify-content: center;\n  font-family: \"SF Mono\", ui-monospace, Menlo, monospace;\n  font-size: 10px; color: rgba(28,25,23,0.45);\n  text-align: center;\n}\n\n/* ================================================================== */\n/* kimi 深夜剧场 — 暖光暗调玻璃                                          */\n/* （与落地页 index.html 同一色板:cream / terra / 暗咖底）              */\n/* ================================================================== */\n.theme-kimi {\n  /* base */\n  --bg:        #1E1D1A;\n  --bg-2:      #16140F;\n  --bg-3:      #0C0B08;\n  --paper:     #232220;\n  --paper-2:   #2A2724;\n\n  /* ink (light on dark) */\n  --ink:       #EEEEEE;\n  --ink-2:     #C8C2BC;\n  --ink-3:     #8A847E;\n  --ink-4:     #5D5852;\n\n  /* warm accents */\n  --cream:        #F3E0CE;\n  --cream-light:  #F0DDC4;\n  --cream-deep:   #E8D4B8;\n  --terra:        #C06553;\n  --terra-deep:   #9F4A3A;\n  --terra-soft:   rgba(192, 101, 83, 0.20);\n  --cream-soft:   rgba(243, 224, 206, 0.10);\n\n  /* glass on dark */\n  --glass-bg:    rgba(255, 255, 255, 0.04);\n  --glass-bg-2:  rgba(255, 255, 255, 0.07);\n  --glass-border: rgba(243, 224, 206, 0.12);\n\n  --shadow:      0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);\n  --shadow-deep: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);\n\n  --hair:        1px solid rgba(255, 255, 255, 0.08);\n  --rule:        rgba(255, 255, 255, 0.10);\n  --rule-strong: rgba(255, 255, 255, 0.18);\n\n  --radius-lg:   16px;\n  --radius-md:   12px;\n  --radius-sm:   10px;\n  --radius-pill: 999px;\n\n  background:\n    radial-gradient(1200px 700px at 18% -10%, rgba(243, 224, 206, 0.07), transparent 60%),\n    radial-gradient(900px 600px at 100% 110%, rgba(192, 101, 83, 0.18), transparent 55%),\n    radial-gradient(700px 500px at 5% 95%, rgba(243, 224, 206, 0.04), transparent 60%),\n    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);\n  color: var(--ink);\n}\n\n/* film-grain on top of the panel for cinema feel */\n.theme-kimi .panel-bg {\n  position: relative;\n  background:\n    radial-gradient(1200px 700px at 18% -10%, rgba(243, 224, 206, 0.07), transparent 60%),\n    radial-gradient(900px 600px at 100% 110%, rgba(192, 101, 83, 0.18), transparent 55%),\n    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);\n}\n.theme-kimi .panel-bg::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  pointer-events: none;\n  background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);\n  background-size: 3px 3px;\n  mix-blend-mode: overlay;\n  opacity: 0.55;\n}\n\n/* glass primitives */\n.theme-kimi .glass {\n  background: var(--glass-bg);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  border: 1px solid var(--glass-border);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow);\n}\n\n/* chips (status) */\n.theme-kimi .chip {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: var(--glass-bg);\n  border: 1px solid var(--glass-border);\n  font-size: 11.5px; color: var(--ink-2);\n}\n.theme-kimi .chip .dot { width: 6px; height: 6px; border-radius: 999px; }\n.theme-kimi .chip.ok   .dot { background: #4ADE80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }\n.theme-kimi .chip.warn .dot { background: var(--terra); box-shadow: 0 0 8px rgba(192,101,83,0.5); }\n.theme-kimi .chip.bad  .dot { background: #F87171; box-shadow: 0 0 8px rgba(248,113,113,0.5); }\n.theme-kimi .chip.cream .dot { background: var(--cream); box-shadow: 0 0 8px rgba(243,224,206,0.5); }\n\n/* buttons */\n.theme-kimi .btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  padding: 10px 18px;\n  border: 1px solid var(--glass-border);\n  border-radius: 999px;\n  font-size: 13.5px; font-weight: 500;\n  cursor: pointer;\n  transition: transform .15s ease, background .15s ease, box-shadow .15s ease, border-color .15s ease;\n  background: var(--glass-bg);\n  color: var(--ink-2);\n  font-family: inherit;\n}\n.theme-kimi .btn-primary {\n  background: var(--cream);\n  color: var(--bg);\n  border-color: var(--cream-light);\n  box-shadow:\n    0 6px 18px rgba(243, 224, 206, 0.18),\n    inset 0 1px 0 rgba(255,255,255,0.4);\n  font-weight: 600;\n}\n.theme-kimi .btn-primary:hover {\n  background: var(--cream-light);\n  transform: translateY(-1px);\n  box-shadow:\n    0 10px 24px rgba(243, 224, 206, 0.25),\n    inset 0 1px 0 rgba(255,255,255,0.5);\n}\n.theme-kimi .btn-secondary {\n  background: var(--glass-bg-2);\n  color: var(--cream);\n  border-color: rgba(243, 224, 206, 0.28);\n}\n.theme-kimi .btn-secondary:hover { background: rgba(243, 224, 206, 0.08); }\n.theme-kimi .btn-ghost {\n  background: transparent;\n  color: var(--ink-2);\n  border-color: rgba(255,255,255,0.10);\n}\n.theme-kimi .btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--ink); border-color: rgba(255,255,255,0.18); }\n\n/* label */\n.theme-kimi .label {\n  font-size: 10.5px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--terra);\n}\n\n.theme-kimi .serif {\n  font-family: \"Instrument Serif\", \"Source Han Serif SC\", \"Songti SC\", serif;\n  font-weight: 400;\n  letter-spacing: -0.015em;\n}\n\n.theme-kimi hr.hair { border: none; border-top: var(--hair); margin: 0; }\n\n/* progress */\n.theme-kimi .progress {\n  height: 6px; border-radius: 999px;\n  background: rgba(255,255,255,0.05);\n  border: 1px solid var(--glass-border);\n  overflow: hidden;\n}\n.theme-kimi .progress > div {\n  height: 100%;\n  background: linear-gradient(90deg, var(--terra) 0%, var(--cream) 100%);\n  box-shadow: 0 0 16px rgba(243, 224, 206, 0.4);\n}\n\n/* inputs */\n.theme-kimi input.k-input,\n.theme-kimi .k-input {\n  background: rgba(0,0,0,0.25);\n  border: 1px solid var(--glass-border);\n  border-radius: 10px;\n  padding: 12px 14px;\n  font-size: 14px;\n  color: var(--ink);\n  font-family: inherit;\n  width: 100%;\n  outline: none;\n  transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;\n}\n.theme-kimi input.k-input::placeholder { color: var(--ink-4); }\n.theme-kimi input.k-input:focus {\n  border-color: rgba(243, 224, 206, 0.45);\n  background: rgba(0,0,0,0.35);\n  box-shadow: 0 0 0 4px rgba(243, 224, 206, 0.08);\n}\n\n/* tabs */\n.theme-kimi .tabs {\n  display: inline-flex;\n  padding: 4px;\n  background: rgba(0,0,0,0.25);\n  border: 1px solid var(--glass-border);\n  border-radius: 999px;\n  gap: 2px;\n}\n.theme-kimi .tabs button {\n  border: 0; background: transparent;\n  color: var(--ink-3);\n  padding: 7px 16px;\n  border-radius: 999px;\n  font-size: 12.5px; font-weight: 500;\n  cursor: pointer;\n  font-family: inherit;\n  transition: background .15s, color .15s;\n}\n.theme-kimi .tabs button.active {\n  background: rgba(243, 224, 206, 0.12);\n  color: var(--cream);\n}\n\n/* placeholder thumb */\n.theme-kimi .thumb {\n  background:\n    repeating-linear-gradient(135deg,\n      rgba(243, 224, 206, 0.08) 0 6px,\n      rgba(243, 224, 206, 0.02) 6px 12px);\n  border: 1px solid var(--glass-border);\n  color: var(--ink-3);\n  display: grid; place-items: center;\n  border-radius: 999px;\n}\n\n.theme-kimi ::selection { background: var(--cream); color: var(--bg); }\n<\u002Fstyle>\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f9760b99-7dc3-46d2-8c65-8c750a5d6362\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e5b4b771-9be2-483d-a29b-4587692d9967\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"361f81fe-d1ac-45f6-ad07-ac088a06ae6e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"dc1869c4-831a-4200-9358-55c54a2033f1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; padding: 0; height: 100%; background: #0C0B08; overflow: hidden; }\n  #root { width: 100%; height: 100%; }\n  .theme-kimi {\n    width: 1280px !important;\n    height: 820px !important;\n    overflow: hidden;\n  }\n<\u002Fstyle>\n\n<script src=\"3d60bdb9-ca16-48cf-8cfb-c722d057ab6a\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n\n\n<div id=\"root\"><\u002Fdiv>\n\n<!-- Shared mock data -->\n<script type=\"text/babel\" src=\"edfa24e4-902b-4833-b168-23f203d2d568\"><\u002Fscript>\n\n<!-- new screens -->\n<script type=\"text/babel\" src=\"b4ca2b3c-b7a1-4978-a0af-c9d53fa153bd\"><\u002Fscript>\n<script type=\"text/babel\" src=\"1110e6d6-4265-47f1-8407-7c56bce29390\"><\u002Fscript>\n<script type=\"text/babel\" src=\"8394bad7-3caa-430b-905c-cf3e591cf5bf\"><\u002Fscript>\n<script type=\"text/babel\" src=\"e4d4d52f-98d0-41e9-9310-3acf8ee8e70b\"><\u002Fscript>\n\n<!-- Tweaks panel scaffolding -->\n<script type=\"text/babel\" src=\"77a3d69e-583b-4ede-8bb4-2aba32908054\"><\u002Fscript>\n\n<!-- Design canvas wrapper -->\n<script type=\"text/babel\" src=\"26070249-664e-4967-ba53-0cfae9314b19\"><\u002Fscript>\n\n<!-- Tweak defaults -->\n<script>\n  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"warmth\": 1,\n    \"creamBoost\": 1,\n    \"density\": \"comfortable\",\n    \"fontScale\": 1,\n    \"showGrain\": true\n  }/*EDITMODE-END*/;\n<\u002Fscript>\n\n<!-- Mount -->\n<script type=\"text/babel\">\n  const W = 1280, H = 820;\n\n  const { KimiLogin } = window.KIMI_AUTH || {};\n  const { KimiDashboard } = window.KIMI_DASH || {};\n  const { KimiTaskDetailDone, KimiTaskDetailLive } = window.KIMI_TASK || {};\n  const { KimiUpload, KimiHistory, KimiSettings } = window.KIMI_MISC || {};\n\n  /* ============================================================\n     Tweaks — global theme controls (cream warmth, density, etc.)\n     ============================================================ */\n  function applyTweaks(t) {\n    let style = document.getElementById('kimi-tweaks-style');\n    if (!style) {\n      style = document.createElement('style');\n      style.id = 'kimi-tweaks-style';\n      document.head.appendChild(style);\n    }\n    // warmth: scales the terra/cream tint of accents\n    const w = Number(t.warmth ?? 1.0);\n    const cb = Number(t.creamBoost ?? 1.0);\n    // density multipliers\n    const dens = t.density === 'compact' ? 0.86 : t.density === 'comfortable' ? 0.93 : 1.0;\n    const fs   = Number(t.fontScale ?? 1.0);\n\n    // override on .theme-kimi root\n    style.textContent = `\n      .theme-kimi {\n        --terra:        oklch(${0.58 * (1 + (cb - 1) * 0.3)} ${0.13 * w} 38);\n        --cream:        oklch(${Math.min(0.95, 0.90 + (cb - 1) * 0.04)} ${0.045 * w} 80);\n      }\n      .theme-kimi .panel-bg {\n        ${t.showGrain ? '' : 'background-image: none;'}\n      }\n      .theme-kimi .panel-bg::before {\n        opacity: ${t.showGrain ? 0.55 : 0};\n      }\n      .theme-kimi main, .theme-kimi aside, .theme-kimi .glass {\n        font-size: ${100 * fs}%;\n      }\n      .theme-kimi {\n        --pad-mul: ${dens};\n      }\n    `;\n  }\n\n  function CanvasTweaks() {\n    const { TweaksPanel, useTweaks, TweakSection, TweakSlider, TweakRadio, TweakToggle, TweakColor } = window;\n    if (!TweaksPanel) return null;\n    const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);\n    React.useEffect(() => { applyTweaks(t); }, [t]);\n\n    return (\n      <TweaksPanel title=\"Tweaks · 深夜剧场\">\n        <TweakSection label=\"色温\">\n          <TweakSlider\n            label=\"陶土暖度 (terra)\"\n            value={t.warmth} onChange={(v) => setTweak('warmth', v)}\n            min={0.4} max={1.6} step={0.05} unit=\"×\"\n          />\n          <TweakSlider\n            label=\"奶油亮度 (cream)\"\n            value={t.creamBoost} onChange={(v) => setTweak('creamBoost', v)}\n            min={0.8} max={1.2} step={0.02} unit=\"×\"\n          />\n          <TweakToggle\n            label=\"电影颗粒 (film grain)\"\n            value={t.showGrain} onChange={(v) => setTweak('showGrain', v)}\n          />\n        <\u002FTweakSection>\n\n        <TweakSection label=\"布局\">\n          <TweakRadio\n            label=\"信息密度\"\n            value={t.density} onChange={(v) => setTweak('density', v)}\n            options={[\n              { value: 'compact',     label: '紧凑' },\n              { value: 'comfortable', label: '舒适' },\n              { value: 'spacious',    label: '空旷' },\n            ]}\n          />\n          <TweakSlider\n            label=\"字号\"\n            value={t.fontScale} onChange={(v) => setTweak('fontScale', v)}\n            min={0.85} max={1.15} step={0.025} unit=\"×\"\n          />\n        <\u002FTweakSection>\n      <\u002FTweaksPanel>\n    );\n  }\n\n  function App() {\n    return (\n      <React.Fragment>\n        <CanvasTweaks />\n        <DesignCanvas>\n\n          <DCSection id=\"auth\" title=\"① 登录 · Login\" subtitle=\"左右分栏 · 左侧 manifesto · 右侧完整表单(邮箱密码 + 验证码 + OAuth)\">\n            <DCArtboard id=\"auth\" label=\"登录 · Login\" width={W} height={H}><KimiLogin /><\u002FDCArtboard>\n          <\u002FDCSection>\n\n          <DCSection id=\"dashboard\" title=\"② Dashboard · 案桌\" subtitle=\"出版物 masthead + 指标条 + Now Playing 特写 + 同期榜单\">\n            <DCArtboard id=\"dash\" label=\"案桌 · Dashboard\" width={W} height={H}><KimiDashboard /><\u002FDCArtboard>\n          <\u002FDCSection>\n\n          <DCSection id=\"task\" title=\"③ 任务详情 · Task Detail\" subtitle=\"两种状态各一稿 · 进行中(胶片 + 实时日志) / 已完成(案卷叙事 + 多 tab)\">\n            <DCArtboard id=\"task-live\" label=\"任务详情 · 进行中(胶片 + 实时日志)\" width={W} height={H}><KimiTaskDetailLive /><\u002FDCArtboard>\n            <DCArtboard id=\"task-done\" label=\"任务详情 · 已完成(案卷 + 多 tab)\"    width={W} height={H}><KimiTaskDetailDone /><\u002FDCArtboard>\n          <\u002FDCSection>\n\n          <DCSection id=\"misc\" title=\"④ 配套 · 上传 / 历史 / 设置\" subtitle=\"沿用同一套语言\">\n            <DCArtboard id=\"misc-upload\"   label=\"新建任务 · Upload\"   width={W} height={H}><KimiUpload /><\u002FDCArtboard>\n            <DCArtboard id=\"misc-history\"  label=\"历史 · History\"      width={W} height={H}><KimiHistory /><\u002FDCArtboard>\n            <DCArtboard id=\"misc-settings\" label=\"设置 · Settings\"     width={W} height={H}><KimiSettings /><\u002FDCArtboard>\n          <\u002FDCSection>\n\n        <\u002FDesignCanvas>\n      <\u002FReact.Fragment>\n    );\n  }\n\n  const root = ReactDOM.createRoot(document.getElementById('root'));\n  root.render(<App />);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
